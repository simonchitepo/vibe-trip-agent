name: vibe_trip_agent
description: Vibe-based trip planner demo (Flutter/Dart).
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  intl: ^0.19.0
  dio: ^5.6.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  uuid: ^4.5.0
  flutter_typeahead: ^5.2.0
  url_launcher: ^6.3.0
  http: ^1.2.2
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # App icon generator (Android/iOS/Web/Windows)
  flutter_launcher_icons: ^0.14.4

  # MSIX packaging for Windows / Microsoft Store
  msix: ^3.16.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png

# -----------------------------
# Launcher icons (all platforms)
# -----------------------------
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"

  # Android adaptive icon
  adaptive_icon_background: "#6C63FF"
  adaptive_icon_foreground: "assets/icon/icon.png"

  # Windows runner icon
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 256

  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#6C63FF"
    theme_color: "#6C63FF"

# --------------------------------------------
# Microsoft Store / MSIX packaging configuration
# (Values from your "View product identity" screenshot)
# --------------------------------------------
msix_config:
  # What users see (must match the name you reserved in Partner Center)
  display_name: "Vibe trip agent"
  publisher_display_name: "cyph3r"

  # MUST match Partner Center "Package/Identity"
  identity_name: "cyph3r.Vibetripagent"
  publisher: "CN=7456A62D-B4E5-49F3-9485-ADF80146DE6A"

  # Store requires Revision (4th) = 0
  # Map Dart build +1 into the 3rd field
  msix_version: "1.0.3.0"

  # App branding
  logo_path: "assets/icon/icon.png"

  # Target arch
  architecture: "x64"

  # Capabilities (safe default)
  capabilities: "internetClient"

  # Store signs the package
  sign_msix: false

  # References (not required by msix tool; for your records)
  # package_family_name: "cyph3r.Vibetripagent_fb6bh328pz6dt"
  # store_id: "9P6C20223XX9"
